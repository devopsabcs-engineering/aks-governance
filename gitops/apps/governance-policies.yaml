# gitops/apps/governance-policies.yaml
# Child ApplicationSet (managed by the root app-of-apps) that fans the Kyverno governance
# policies out to EVERY registered workload cluster. Runs in sync-wave "1" so it applies
# after the Kyverno engine (gitops/apps/kyverno.yaml, wave "0").
#
# The cluster generator reads the ArgoCD cluster Secrets and templates one Application per
# Secret whose labels match selector.matchLabels {type: workload}. Because the in-cluster
# management target has NO cluster Secret, it is naturally excluded — policies only land on
# the remote workload clusters registered by scripts/register-argocd-clusters.ps1.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: governance-policies
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            type: workload # only workload clusters; excludes mgmt/in-cluster (no Secret)
  template:
    metadata:
      name: 'policies-{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "1" # after Kyverno engine install (wave 0)
    spec:
      project: default
      source:
        # <<< PLACEHOLDER: replace with your aks-governance repo HTTPS URL >>>
        repoURL: https://github.com/devopsabcs-engineering/aks-governance.git
        targetRevision: HEAD
        path: gitops/policies/kyverno # folder of ClusterPolicy YAML
      destination:
        server: '{{.server}}' # the matched workload cluster API server
        namespace: kyverno
      # Kyverno's mutating admission webhook injects default fields into every
      # ClusterPolicy spec at apply time (spec.admission, spec.emitWarning, and per-rule
      # spec.rules[].skipBackgroundRequests / spec.rules[].validate.allowExistingViolations).
      # These defaults are absent from git, so ArgoCD otherwise reports the policies-<cluster>
      # apps as perpetually OutOfSync even though the authored spec is identical. Ignore only
      # those Kyverno-defaulted fields; genuine spec drift is still detected. This affects
      # ArgoCD's diff/sync-status only — never what is applied. (Confirmed via live-vs-git
      # diff of the applied ClusterPolicy on 2026-06-16.)
      ignoreDifferences:
        - group: kyverno.io
          kind: ClusterPolicy
          jsonPointers:
            - /spec/admission
            - /spec/emitWarning
          jqPathExpressions:
            - '.spec.rules[].skipBackgroundRequests'
            - '.spec.rules[].validate.allowExistingViolations'
      syncPolicy:
        automated:
          prune: true
          # selfHeal is intentionally OFF: the registry demo (scripts/demo-registry.ps1)
          # temporarily patches the live block-docker-quay-registries ClusterPolicy to
          # Audit to capture a PolicyReport, then back to Enforce. With selfHeal enabled
          # ArgoCD would race to revert that live edit. Git still defines Enforce as the
          # desired end-state, and ArgoCD auto-syncs on any git change; only unsolicited
          # live drift is left alone.
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
