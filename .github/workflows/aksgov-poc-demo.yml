name: aksgov-poc-demo

# End-to-end AKS Governance PoC: preflight -> deploy mgmt (CAPI/CAPZ/ASO + ArgoCD) ->
# provision workload clusters -> register them in ArgoCD -> Example A (registry deny) ->
# Example B (min-K8s-version reject) -> capture evidence -> optional wiki publish ->
# approval-gated teardown.
#
# The teardown job is tied to the `aksgov-poc-teardown` GitHub Environment. Configure that
# environment in repo Settings -> Environments with "Required reviewers" so the destroy
# step pauses for manual approval before deleting any resource group. See docs/runbook.md.

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Management resource group for all PoC resources
        type: string
        default: rg-aksgov-poc-mgmt
      location:
        description: Primary / management Azure region
        type: string
        default: canadacentral
      workloadLocation2:
        description: Second workload-cluster region (preflight checks both)
        type: string
        default: canadacentral
      minK8sVersion:
        description: Minimum Kubernetes version the enforce-min-k8s-version policy admits (informational for this run)
        type: string
        default: v1.28.0
      kubernetesVersion:
        description: AKS Kubernetes version for the management cluster (empty = AKS default)
        type: string
        default: ''
      runCapture:
        description: Capture CLI/portal evidence after the demos
        type: boolean
        default: true
      publishWiki:
        description: Publish the walkthrough to this repo's GitHub wiki (requires WIKI_PAT secret)
        type: boolean
        default: true

# Serialize runs so two pipelines never operate on the same resource group at once.
concurrency:
  group: aksgov-poc-${{ inputs.resourceGroup }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC federated login to Azure
  contents: read

env:
  RESOURCE_GROUP: ${{ inputs.resourceGroup }}
  LOCATION: ${{ inputs.location }}
  MGMT_CLUSTER_NAME: aksgov-poc-mgmt
  # Pin kubelogin so `az aks install-cli` does NOT query the GitHub releases API
  # (api.github.com is rate-limited to 60 req/hr unauthenticated on shared runners,
  # which intermittently fails the install with "HTTP Error 403: rate limit exceeded").
  # Pinning downloads the asset directly from the releases CDN, bypassing the API.
  KUBELOGIN_VERSION: "0.2.18"

jobs:
  preflight:
    name: Preflight - Azure readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run preflight checks
        shell: bash
        run: |
          pwsh -File scripts/preflight.ps1 \
            -Location '${{ inputs.location }}' \
            -WorkloadLocation2 '${{ inputs.workloadLocation2 }}' \
            -KubernetesVersion '${{ inputs.kubernetesVersion }}' \
            -SubscriptionId '${{ secrets.AZURE_SUBSCRIPTION_ID }}'

  deploy-mgmt:
    name: Deploy management cluster + GitOps
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Install Helm
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install clusterctl
        shell: bash
        run: |
          curl -fsSL https://github.com/kubernetes-sigs/cluster-api/releases/latest/download/clusterctl-linux-amd64 -o clusterctl
          sudo install -o root -g root -m 0755 clusterctl /usr/local/bin/clusterctl
          clusterctl version

      - name: Deploy management cluster (Bicep + clusterctl init + ArgoCD)
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Lets ArgoCD authenticate to this (potentially private/internal) repo for the
          # app-of-apps source, so the root Application syncs instead of sitting in
          # 'Unknown' (WI-07). Prefer a durable credential (secrets.ARGOCD_GIT_PAT, e.g. a
          # fine-grained PAT or GitHub App token with read-only Contents on this repo):
          # the ephemeral github.token is REVOKED when the job ends, so ArgoCD can no
          # longer pull afterward and the GitOps fan-out (ApplicationSets) never reconciles.
          # Falls back to github.token (works only for the life of this job) when the
          # secret is unset, so existing setups keep working.
          ARGOCD_GIT_TOKEN: ${{ secrets.ARGOCD_GIT_PAT || github.token }}
        run: |
          pwsh -File scripts/deploy-mgmt.ps1 \
            -ResourceGroup '${{ inputs.resourceGroup }}' \
            -Location '${{ inputs.location }}' \
            -SubscriptionId '${{ secrets.AZURE_SUBSCRIPTION_ID }}' \
            -KubernetesVersion '${{ inputs.kubernetesVersion }}' \
            -UseFederatedLogin

  provision:
    name: Provision workload clusters (CAPI/CAPZ)
    needs: deploy-mgmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Install clusterctl
        shell: bash
        run: |
          curl -fsSL https://github.com/kubernetes-sigs/cluster-api/releases/latest/download/clusterctl-linux-amd64 -o clusterctl
          sudo install -o root -g root -m 0755 clusterctl /usr/local/bin/clusterctl

      - name: Get management cluster credentials
        shell: bash
        run: az aks get-credentials --resource-group '${{ inputs.resourceGroup }}' --name "$MGMT_CLUSTER_NAME" --overwrite-existing --admin --only-show-errors

      - name: Provision workload clusters
        shell: bash
        run: pwsh -File scripts/provision-clusters.ps1 -ClustersDir clusters

      - name: Upload workload kubeconfigs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: aksgov-kubeconfigs
          path: kubeconfigs/
          if-no-files-found: warn

  register-argocd:
    name: Register workload clusters in ArgoCD
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Get management cluster credentials
        shell: bash
        run: az aks get-credentials --resource-group '${{ inputs.resourceGroup }}' --name "$MGMT_CLUSTER_NAME" --overwrite-existing --admin --only-show-errors

      - name: Download workload kubeconfigs
        uses: actions/download-artifact@v4
        with:
          name: aksgov-kubeconfigs
          path: kubeconfigs

      - name: Register workload clusters
        shell: bash
        run: pwsh -File scripts/register-argocd-clusters.ps1 -KubeconfigDir kubeconfigs -ArgoNamespace argocd

  demo-registry:
    name: Example A - registry deny
    needs: register-argocd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Download workload kubeconfigs
        uses: actions/download-artifact@v4
        with:
          name: aksgov-kubeconfigs
          path: kubeconfigs

      - name: Point kubectl at a workload cluster
        shell: bash
        run: |
          KC="$(ls kubeconfigs/*.kubeconfig | head -n 1)"
          echo "KUBECONFIG=$GITHUB_WORKSPACE/$KC" >> "$GITHUB_ENV"

      - name: Wait for ArgoCD to fan out Kyverno + registry policy
        shell: bash
        run: |
          # The registry ClusterPolicy reaches this workload cluster only via the ArgoCD
          # app-of-apps fan-out (Kyverno engine wave 0, policies wave 1), which is async and
          # starts only after the cluster Secret is registered. Wait for the policy to be
          # Ready before applying demo Pods so we assert real governance rather than racing
          # ahead of the sync (a miss would otherwise admit the Pod and mask a broken fan-out).
          echo "Waiting for block-docker-quay-registries ClusterPolicy to become Ready..."
          deadline=$(( $(date +%s) + 900 ))   # up to 15 minutes
          while :; do
            # Kyverno >=1.10 reports readiness via .status.conditions[type=Ready];
            # older builds used the now-deprecated boolean .status.ready. Accept either.
            RC="$(kubectl get clusterpolicy block-docker-quay-registries -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
            RB="$(kubectl get clusterpolicy block-docker-quay-registries -o jsonpath='{.status.ready}' 2>/dev/null || true)"
            if [ "$RC" = "True" ] || [ "$RB" = "true" ]; then
              echo "ClusterPolicy is Ready (validationFailureAction=Enforce):"
              kubectl get clusterpolicy block-docker-quay-registries -o wide || true
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for the Kyverno registry policy on the workload cluster. The ArgoCD GitOps fan-out is likely not working (check the root Application / ApplicationSets and the ARGOCD_GIT_PAT credential)."
              kubectl get clusterpolicy -A 2>/dev/null || true
              kubectl get pods -n kyverno 2>/dev/null || true
              exit 1
            fi
            echo "  ...not Ready yet; retrying in 15s"
            sleep 15
          done

      - name: Run registry-deny demo (two-phase Audit -> Enforce)
        shell: bash
        run: |
          # demo-registry.ps1 runs both phases against this workload cluster: it patches
          # the live policy to Audit (admit + capture a PolicyReport), then flips it back
          # to Enforce (block) and captures the denies. selfHeal is off on the policies
          # ApplicationSet so ArgoCD does not revert the in-run Audit toggle.
          pwsh -File scripts/demo-registry.ps1 -CaptureDir docs/captures

      - name: Upload Example A captures
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: captures-registry
          # Upload ONLY this demo's own capture files. Uploading the whole
          # docs/captures/ dir would also bundle the checked-out (stale, committed)
          # copies of the other demo's files, which then clobber the fresh captures
          # when both artifacts are downloaded into the same dir in the capture job.
          path: docs/captures/demo-registry-*.txt
          if-no-files-found: warn

  demo-min-version:
    name: Example B - min K8s version reject
    needs: demo-registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Get management cluster credentials
        shell: bash
        run: az aks get-credentials --resource-group '${{ inputs.resourceGroup }}' --name "$MGMT_CLUSTER_NAME" --overwrite-existing --admin --only-show-errors

      - name: Run min-version reject demo
        shell: bash
        run: pwsh -File scripts/demo-min-version.ps1 -CaptureDir docs/captures

      - name: Upload Example B captures
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: captures-min-version
          # Upload ONLY this demo's own capture file (see the Example A note above).
          path: docs/captures/demo-min-version.txt
          if-no-files-found: warn

  capture:
    name: Capture evidence
    needs: demo-min-version
    if: ${{ always() && inputs.runCapture }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Install clusterctl
        shell: bash
        run: |
          curl -fsSL https://github.com/kubernetes-sigs/cluster-api/releases/latest/download/clusterctl-linux-amd64 -o clusterctl
          sudo install -o root -g root -m 0755 clusterctl /usr/local/bin/clusterctl
          clusterctl version

      - name: Get management cluster credentials
        shell: bash
        run: az aks get-credentials --resource-group '${{ inputs.resourceGroup }}' --name "$MGMT_CLUSTER_NAME" --overwrite-existing --admin --only-show-errors

      - name: Download Example A captures
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: captures-registry
          path: docs/captures

      - name: Download Example B captures
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: captures-min-version
          path: docs/captures

      - name: Capture CLI evidence
        shell: bash
        run: |
          pwsh -File scripts/capture.ps1 \
            -ResourceGroup '${{ inputs.resourceGroup }}' \
            -MgmtClusterName "$MGMT_CLUSTER_NAME" \
            -CaptureDir docs/captures \
            -ScreenshotDir docs/screenshots \
            -SkipScreenshots

      - name: Upload PoC captures
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: aksgov-poc-captures
          path: |
            docs/captures/
            docs/screenshots/
          if-no-files-found: warn

  publish-wiki:
    name: Publish walkthrough
    needs: capture
    if: ${{ always() && inputs.publishWiki && needs.capture.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PoC captures
        uses: actions/download-artifact@v4
        with:
          name: aksgov-poc-captures
          path: docs

      - name: Publish to wiki
        shell: bash
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
        run: |
          pwsh -File scripts/publish-wiki.ps1 \
            -Target github \
            -WikiRepoUrl 'https://github.com/devopsabcs-engineering/aks-governance.wiki.git'

  teardown:
    name: Teardown (approval required)
    needs: [deploy-mgmt, provision, register-argocd, demo-registry, demo-min-version, capture, publish-wiki]
    # Run even if earlier jobs failed/were skipped so the demo never leaks cost,
    # but only once the management cluster was actually created.
    if: ${{ always() && needs.deploy-mgmt.result == 'success' }}
    runs-on: ubuntu-latest
    # Manual approval gate: the `aksgov-poc-teardown` environment must have
    # required reviewers configured in repo Settings -> Environments.
    environment: aksgov-poc-teardown
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        shell: bash
        run: az aks install-cli --kubelogin-version "${{ env.KUBELOGIN_VERSION }}" --only-show-errors

      - name: Get management cluster credentials
        continue-on-error: true
        shell: bash
        run: az aks get-credentials --resource-group '${{ inputs.resourceGroup }}' --name "$MGMT_CLUSTER_NAME" --overwrite-existing --admin --only-show-errors

      - name: Cost-safe teardown (workload clusters first, then mgmt RG)
        shell: bash
        run: |
          pwsh -File scripts/teardown.ps1 \
            -ResourceGroup '${{ inputs.resourceGroup }}' \
            -MgmtClusterName "$MGMT_CLUSTER_NAME" \
            -ClustersDir clusters \
            -Force
